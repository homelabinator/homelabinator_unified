<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelabinator</title>
</head>
<body class="min-h-screen bg-white font-sans text-black m-0">
    <header class="min-h-20 bg-[#eaeaea] flex flex-col md:flex-row items-center justify-between px-5 md:px-10 py-4 md:py-0 sticky top-0 z-[1000] shadow-sm gap-4">
        <h1 class="text-3xl md:text-4xl font-bold m-0 cursor-pointer" onclick="window.setPage('apps')">Homelabinator</h1>
        
        <div class="relative flex items-center bg-[#f9f9f9] border-[2.5px] border-black rounded-[20px] px-5 py-2 w-full md:w-[500px]" id="search-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 md:w-8 md:h-8 mr-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input type="text" placeholder="Search apps..." class="bg-transparent border-none text-lg md:text-xl w-full outline-none" id="app-search" />
        </div>

        <div class="flex flex-wrap justify-center gap-3 md:gap-5">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSeQPU8kGGzqNakAUN7NK6oJ-4jKhNHbKj6gsCQHPqj4rkPYwg/viewform" target="_blank" rel="noopener noreferrer" class="no-underline text-black border-2 border-black px-4 md:px-6 py-1.5 md:py-2 rounded-xl font-medium cursor-pointer text-sm md:text-base text-center">Giveaway</a>
            <a href="https://github.com/homelabinator/homelabinator_unified" target="_blank" rel="noopener noreferrer" class="no-underline text-black border-2 border-black px-4 md:px-6 py-1.5 md:py-2 rounded-xl font-medium cursor-pointer text-sm md:text-base text-center">GitHub</a>
            <button onclick="window.setPage('about')" class="no-underline text-black border-2 border-black px-4 md:px-6 py-1.5 md:py-2 rounded-xl font-medium cursor-pointer text-sm md:text-base">About</button>
        </div>
    </header>

    <main id="main-content">
        <!-- Pages will be rendered here -->
        <div class="flex justify-center items-center py-20">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
    </main>

    <!-- App Detail Modal -->
    <dialog id="app-modal" class="modal bg-black/60 backdrop-blur-sm">
        <div id="modal-content" class="w-full max-w-7xl flex justify-center p-4">
            <!-- Content will be injected here -->
        </div>
    </dialog>

    <!-- Settings Modal -->
    <dialog id="settings-modal" class="modal bg-black/60 backdrop-blur-sm">
        <div id="settings-content" class="w-full max-w-7xl flex justify-center p-4">
            <!-- Content will be injected here -->
        </div>
    </dialog>

    <!-- Mobile Warning Modal -->
    <dialog id="mobile-warning-modal" class="modal bg-black/60 backdrop-blur-sm">
        <div class="modal-box border-[5px] border-black rounded-[30px] p-8">
            <h3 class="font-bold text-3xl mb-4">Hold up, wait a minute, something aint right!</h3>
            <p class="text-xl mb-6">Homelabinator currently only works on desktop devices (due to relaince on a USB drive for booting), but to check back later.</p>
            <div class="modal-action">
                <form method="dialog">
                    <button class="bg-[#efeef6] border-[4px] border-[#0088ff] text-[#0088ff] px-8 py-3 rounded-xl font-bold text-xl hover:bg-[#0088ff] hover:text-white transition-colors">Got it</button>
                </form>
            </div>
        </div>
    </dialog>

    <!-- Navigation Overlay -->
    <div id="back-button-container" class="fixed bottom-10 left-10 z-[100]">
        <button id="back-button" onclick="window.navigateBack()" class="bg-[#efeef6] border-[5px] border-[#0088ff] text-[#0088ff] cursor-pointer flex items-center justify-center text-3xl font-bold px-8 py-4 rounded-[20px] gap-4 shadow-2xl hover:scale-105 transition-transform hidden">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            <span>Back</span>
        </button>
    </div>

    <div id="next-button-container" class="fixed bottom-10 right-10 z-[100]">
        <button id="next-button" onclick="window.navigateNext()" class="bg-[#efeef6] border-[5px] border-[#0088ff] text-[#0088ff] cursor-pointer flex items-center justify-center text-3xl font-bold px-8 py-4 rounded-[20px] gap-4 shadow-2xl hover:scale-105 transition-transform hidden">
            <span>Next</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
            </svg>
        </button>
    </div>

    <script type="module" src="/src/app.ts"></script>
</body>
</html>
