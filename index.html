<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelabinator</title>
</head>
<body class="min-h-screen bg-white font-sans text-black m-0">
    <header class="h-20 bg-[#eaeaea] flex items-center justify-between px-10 sticky top-0 z-[1000] shadow-sm">
        <h1 class="text-4xl font-bold m-0 cursor-pointer" onclick="window.setPage('apps')">Homelabinator</h1>
        
        <div class="relative flex items-center bg-[#f9f9f9] border-[2.5px] border-black rounded-[20px] px-5 py-2 w-[500px]" id="search-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 mr-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input type="text" placeholder="Search apps..." class="bg-transparent border-none text-xl w-full outline-none" id="app-search" />
        </div>

        <div class="flex gap-5">
            <button onclick="window.setPage('about')" class="no-underline text-black border-2 border-black px-6 py-2 rounded-xl font-medium cursor-pointer">About</button>
            <a href="https://github.com/homelabinator/homelabinator_unified" target="_blank" rel="noopener noreferrer" class="no-underline text-black border-2 border-black px-6 py-2 rounded-xl font-medium cursor-pointer">GitHub</a>
        </div>
    </header>

    <main id="main-content">
        <!-- Pages will be rendered here -->
        <div class="flex justify-center items-center py-20">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
    </main>

    <!-- App Detail Modal -->
    <dialog id="app-modal" class="modal bg-black/60 backdrop-blur-sm">
        <div id="modal-content" class="w-full max-w-7xl flex justify-center p-4">
            <!-- Content will be injected here -->
        </div>
    </dialog>

    <!-- Navigation Overlay -->
    <div id="back-button-container" class="fixed bottom-10 left-10 z-[100]">
        <button id="back-button" onclick="window.navigateBack()" class="bg-[#efeef6] border-[5px] border-[#0088ff] text-[#0088ff] cursor-pointer flex items-center justify-center text-3xl font-bold px-8 py-4 rounded-[20px] gap-4 shadow-2xl hover:scale-105 transition-transform hidden">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            <span>Back</span>
        </button>
    </div>

    <div id="next-button-container" class="fixed bottom-10 right-10 z-[100]">
        <button id="next-button" onclick="window.navigateNext()" class="bg-[#efeef6] border-[5px] border-[#0088ff] text-[#0088ff] cursor-pointer flex items-center justify-center text-3xl font-bold px-8 py-4 rounded-[20px] gap-4 shadow-2xl hover:scale-105 transition-transform hidden">
            <span>Next</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
            </svg>
        </button>
    </div>

    <script type="module" src="/src/app.ts"></script>
</body>
</html>
