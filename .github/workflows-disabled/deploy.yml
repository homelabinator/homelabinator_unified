name: Deploy Backend

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "PORT=3001" >> $GITHUB_ENV
            echo "TMUX_SESSION=prod-homelabinator-unified" >> $GITHUB_ENV
            echo "NPM_SCRIPT=prod" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "PORT=3000" >> $GITHUB_ENV
            echo "TMUX_SESSION=dev-homelabinator-unified" >> $GITHUB_ENV
            echo "NPM_SCRIPT=dev" >> $GITHUB_ENV
          fi

      - name: Deploy to remote
        env:
          REMOTE_USER: snowflake
          REMOTE_HOST: 0.0.0.0
          REMOTE_BASE_DIR: homelabinator-unified
        run: |
          REMOTE_TARGET_DIR="${REMOTE_BASE_DIR}/${{ env.ENV_NAME }}"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "rm -rf ${REMOTE_TARGET_DIR}"
          rsync -avz --exclude '.**' --exclude '.*' ./ "${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_TARGET_DIR}/"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "tmux kill-session -t ${{ env.TMUX_SESSION }} 2>/dev/null || true"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "tmux new-session -d -s ${{ env.TMUX_SESSION }} \"cd ~/${REMOTE_TARGET_DIR} && nix-shell -p nodejs_24 --command 'npm i && npm run ${{ env.NPM_SCRIPT }}'\""
