<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelabinator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Homelabinator</h1>
        <div class="row">
            <div class="col-md-4">
                <h2>Apps</h2>
                <div id="apps-list"></div>
            </div>
            <div class="col-md-8">
                <h2>Configuration</h2>
                <div id="app-details"></div>
                <button id="generate-config" class="btn btn-primary mt-3">Generate Config</button>
                <button id="download-config" class="btn btn-secondary mt-3">Download Config</button>
                <pre id="config-output" class="mt-3 bg-light p-3"></pre>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
